<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Jolly Roger — Neverland Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style id="theme-vars">
:root {
  --sky: #030c1a; --deep: #050f22; --card: rgba(6,18,45,0.82);
  --card-border: rgba(40,90,160,0.28); --card-hover: rgba(8,24,60,0.95);
  --accent1: #f5c842; --accent2: #1dd3b0; --accent3: #6366f1;
  --positive: #4ade80; --negative: #f87171; --warning: #fb923c;
  --text: #c8d8f0; --text-dim: #5a7898; --text-bright: #e8f4ff;
  --glow1: rgba(245,200,66,0.18); --glow2: rgba(29,211,176,0.15);
  --skull: #f5c842; --divider: rgba(40,90,180,0.2);
}
.theme-skull-rock {
  --sky: #0d0608; --deep: #150a0c; --card: rgba(25,8,12,0.88);
  --card-border: rgba(180,30,40,0.3); --accent1: #ff6b35;
  --text: #f0d0c8; --text-dim: #885050; --glow1: rgba(255,107,53,0.2);
}
</style>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Crimson Text', Georgia, serif; background: var(--sky); color: var(--text); min-height: 100vh; overflow-x: hidden; }
#starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
#island-silhouette { position: fixed; bottom: 0; width: 100%; z-index: 1; opacity: 0.35; pointer-events: none; }
.page-wrap { position: relative; z-index: 2; max-width: 1280px; margin: 0 auto; padding: 0 1rem 4rem; }

/* Top Bar */
#topbar { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1.2rem; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--divider); font-family: 'Rajdhani', sans-serif; font-size: 0.78rem; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }

/* Header */
header { text-align: center; padding: 3.5rem 1rem 2.5rem; }
h1.logo { font-family: 'Pirata One', cursive; font-size: clamp(2.2rem, 6vw, 4.2rem); color: var(--accent1); text-shadow: 0 0 30px var(--glow1); line-height: 1; }
.header-sub { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.35em; color: var(--text-dim); text-transform: uppercase; }

/* Cards & Grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.8rem; }
.stat-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 8px; padding: 1.2rem; position: relative; }
.stat-card .value { font-family: 'Rajdhani', sans-serif; font-size: 1.9rem; font-weight: 700; color: var(--text-bright); }

/* Tools */
.card-box { background: var(--card); border: 1px solid var(--card-border); border-radius: 8px; padding: 1.4rem; margin-bottom: 1.4rem; backdrop-filter: blur(8px); }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 1rem; margin-bottom: 1.2rem; }
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

.calc-btn { font-family: 'Cinzel', serif; padding: 0.7rem 1.8rem; background: linear-gradient(135deg, var(--accent1), var(--accent2)); border: none; border-radius: 5px; cursor: pointer; font-weight: 700; }

/* Optimal Row Effect */
.optimal-row { border: 1px solid var(--accent1) !important; animation: pulse-gold 2s infinite; }
@keyframes pulse-gold {
  0%, 100% { background: rgba(245,200,66,0.07); box-shadow: inset 0 0 5px var(--glow1); }
  50% { background: rgba(245,200,66,0.18); box-shadow: inset 0 0 20px var(--glow1); }
}

.result-box { background: rgba(0,0,0,0.25); border: 1px solid var(--card-border); border-radius: 6px; padding: 0.8rem 1rem; }
.r-label { font-family: 'Rajdhani', sans-serif; font-size: 0.65rem; text-transform: uppercase; color: var(--text-dim); }
.r-val { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; font-weight: 700; }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="topbar">
  <div class="left"><span id="last-updated">Battening hatches...</span></div>
  <div class="right"><div class="theme-btn" data-theme="default">Default</div></div>
</div>

<div class="page-wrap">
  <header>
    <h1 class="logo">The Jolly Roger</h1>
    <div class="header-sub">Neverland Strategy Command Deck</div>
  </header>

  <div class="card-box">
    <div class="sec-head">⚔️ Leverage Simulator</div>
    <div class="form-grid">
      <div class="form-group"><label>Deposit (USD)</label><input type="number" id="lev-deposit" value="1000"></div>
      <div class="form-group"><label>Target Leverage</label><input type="range" id="lev-leverage" min="1" max="5" step="0.1" value="2"> <span id="lev-leverage-val">2.0x</span></div>
      <div class="form-group"><label>Asset</label><select id="lev-asset"><option value="0.78,0.85,5,6">USDC (LTV 78%)</option><option value="0.60,0.70,8,12">MON (LTV 60%)</option></select></div>
      <button class="calc-btn" onclick="calcLeverage()">Plot Course</button>
    </div>
    <div class="result-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:1rem;">
      <div class="result-box"><div class="r-label">Total Position</div><div class="r-val" id="lev-r-pos">—</div></div>
      <div class="result-box"><div class="r-label">DUST Velocity</div><div class="r-val" id="lev-r-dust">—</div></div>
    </div>
  </div>

  <div class="card-box">
    <div class="sec-head">💀 Storm Warning (Liquidation)</div>
    <div class="form-grid">
      <div class="form-group"><label>Collateral (USD)</label><input type="number" id="liq-collateral" value="10000"></div>
      <div class="form-group"><label>Debt (USD)</label><input type="number" id="liq-debt" value="5000"></div>
      <div class="form-group"><label>Asset Volatility</label><select id="liq-asset-type"><option value="stable">Stable</option><option value="volatile">Volatile (ETH)</option><option value="high-vol">Kraken (MON)</option></select></div>
      <button class="calc-btn" onclick="calcLiquidation()">Check Horizons</button>
    </div>
    <div class="result-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:1rem;">
      <div class="result-box"><div class="r-label">HF</div><div class="r-val" id="liq-r-hf">—</div></div>
      <div class="result-box"><div class="r-label" id="liq-r-rec-label">Storm Warning (Exit @)</div><div class="r-val" id="liq-r-rec">—</div></div>
    </div>
  </div>

  <div class="card-box">
    <div class="sec-head">🔭 Spyglass (Wallet Sim)</div>
    <input type="text" id="wallet-addr" placeholder="0x..." style="width:100%; padding:0.5rem; background:#000; color:#fff; border:1px solid var(--card-border); margin-bottom:1rem;">
    <button class="calc-btn" onclick="loadWallet()">Scan Vessel</button>
    <div id="wallet-result" style="margin-top:1rem; display:none;">
        <div id="rank-display"></div>
        <div class="r-val" id="w-collateral"></div>
    </div>
  </div>

  <div class="card-box">
    <div class="sec-head">🔄 Loop Optimizer (X Marks the Spot)</div>
    <button class="calc-btn" onclick="calcLoop()">Run Simulation</button>
    <div id="loop-result" style="margin-top:1rem;"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const fmt = { usd: v => v == null ? '—' : `$${v.toLocaleString()}` };

function calcLeverage() {
  const deposit = parseFloat($('lev-deposit').value) || 0;
  const leverage = parseFloat($('lev-leverage').value) || 1;
  const position = deposit * leverage;
  const velocity = position / (deposit || 1);

  $('lev-r-pos').textContent = fmt.usd(position);
  $('lev-r-dust').innerHTML = `<span style="color:var(--accent1)">${velocity.toFixed(1)}x</span> Velocity`;
}

function calcLiquidation() {
  const collateral = parseFloat($('liq-collateral').value) || 1;
  const debt = parseFloat($('liq-debt').value) || 0;
  const type = $('liq-asset-type').value;
  
  // Buffers: High-vol assets require a larger "Storm Warning" cushion
  const buffer = type === 'high-vol' ? 0.25 : (type === 'volatile' ? 0.15 : 0.05);
  const lt = 0.8; // Standard 80% Liq Threshold
  const hf = (collateral * lt) / (debt || 0.001);
  
  const liqPrice = debt / lt;
  const warningPrice = liqPrice * (1 + buffer);

  $('liq-r-hf').textContent = hf.toFixed(2);
  $('liq-r-hf').style.color = hf < 1.1 ? 'var(--negative)' : (hf < 1.5 ? 'var(--warning)' : 'var(--positive)');
  $('liq-r-rec').textContent = fmt.usd(warningPrice);
}

function loadWallet() {
  const addr = $('wallet-addr').value;
  if(!addr) return;
  // Simulated for DEMO purposes as requested
  const mockTVL = Math.random() * 150000;
  const rank = mockTVL > 100000 ? "Dread Admiral 🏴‍☠️" : (mockTVL > 25000 ? "First Mate ⚔️" : "Deckhand 🧹");
  
  $('wallet-result').style.display = 'block';
  $('rank-display').innerHTML = `<div class="r-label">Vessel Rank</div><div style="font-family:'Pirata One'; font-size:2rem; color:var(--accent1)">${rank}</div>`;
  $('w-collateral').textContent = `Total Loot: ${fmt.usd(mockTVL)}`;
}

function calcLoop() {
  let html = `<table style="width:100%; border-collapse:collapse; font-family:'Rajdhani';">
    <tr style="color:var(--text-dim); font-size:0.7rem;"><th>LOOPS</th><th>POSITION</th><th>HF</th></tr>`;
  
  for(let i=1; i<=5; i++) {
    const isOptimal = i === 3; // Mocking 3 as optimal for demo
    const hf = (2.5 - (i * 0.3)).toFixed(2);
    html += `<tr class="${isOptimal ? 'optimal-row' : ''}" style="text-align:center;">
      <td>${i} ${isOptimal ? '★' : ''}</td>
      <td>${fmt.usd(1000 * Math.pow(1.7, i))}</td>
      <td>${hf}</td>
    </tr>`;
  }
  html += `</table>`;
  $('loop-result').innerHTML = html;
}

// Initial Starfield
const canvas = $('starfield');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#fff";
  for(let i=0; i<100; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
}
drawStars();
$('lev-leverage').oninput = function() { $('lev-leverage-val').textContent = this.value + 'x'; };
</script>
</body>
</html>
