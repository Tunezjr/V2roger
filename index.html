<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Jolly Roger — Neverland Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style id="theme-vars">
:root {
  --sky: #030c1a; --deep: #050f22; --card: rgba(6,18,45,0.82); --card-border: rgba(40,90,160,0.28);
  --card-hover: rgba(8,24,60,0.95); --accent1: #f5c842; --accent2: #1dd3b0; --accent3: #6366f1;
  --positive: #4ade80; --negative: #f87171; --warning: #fb923c; --text: #c8d8f0;
  --text-dim: #5a7898; --text-bright: #e8f4ff; --glow1: rgba(245,200,66,0.18);
  --glow2: rgba(29,211,176,0.15); --skull: #f5c842; --divider: rgba(40,90,180,0.2);
}
</style>
<style id="theme-skull-rock">
.theme-skull-rock {
  --sky: #0d0608; --deep: #150a0c; --card: rgba(25,8,12,0.88); --card-border: rgba(180,30,40,0.3);
  --accent1: #ff6b35; --accent2: #e63946; --text: #f0d0c8; --text-dim: #885050; --skull: #ff6b35;
}
</style>
<style id="theme-mermaid-lagoon">
.theme-mermaid-lagoon {
  --sky: #010d14; --deep: #031522; --card: rgba(2,18,32,0.85); --card-border: rgba(0,200,220,0.22);
  --accent1: #00d4e8; --accent2: #b56eff; --text: #b0e8f0; --text-dim: #2a6070; --skull: #00d4e8;
}
</style>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Crimson Text', serif; background: var(--sky); color: var(--text); min-height: 100vh; overflow-x: hidden; }
#starfield { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
#island-silhouette { position: fixed; bottom: 0; left: 0; right: 0; pointer-events: none; z-index: 1; opacity: 0.35; }
.page-wrap { position: relative; z-index: 2; max-width: 1280px; margin: 0 auto; padding: 0 1rem 4rem; }
#topbar { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1.2rem; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--divider); font-family: 'Rajdhani', sans-serif; font-size: 0.78rem; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
.theme-btn { font-family: 'Rajdhani', sans-serif; font-size: 0.72rem; padding: 3px 9px; border: 1px solid var(--card-border); cursor: pointer; color: var(--text-dim); background: var(--card); }
header { text-align: center; padding: 3.5rem 1rem 2.5rem; }
h1.logo { font-family: 'Pirata One', cursive; font-size: clamp(2.2rem, 6vw, 4.2rem); color: var(--accent1); text-shadow: 0 0 30px var(--glow1); }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.8rem; }
.stat-card { background: var(--card); border: 1px solid var(--card-border); padding: 1.2rem; border-radius: 8px; position: relative; }
.neverland-table { width: 100%; border-collapse: collapse; font-family: 'Rajdhani', sans-serif; }
.card-box { background: var(--card); border: 1px solid var(--card-border); border-radius: 8px; padding: 1.4rem; margin-bottom: 1.4rem; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
.strat-card { background: var(--card); border: 1px solid var(--card-border); padding: 1.2rem; border-radius: 8px; transition: 0.3s; }
.tool-panel { display: none; }
.tool-panel.active { display: block; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 1rem; }
.calc-btn { font-family: 'Cinzel', serif; padding: 0.7rem 1.8rem; background: linear-gradient(135deg, var(--accent1), var(--accent2)); cursor: pointer; border: none; border-radius: 5px; font-weight: 700; }
.result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.8rem; margin-top: 1rem; }
.result-box { background: rgba(0,0,0,0.25); border: 1px solid var(--card-border); padding: 0.8rem; border-radius: 6px; }
.hf-bar-wrap { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
.hf-bar { height: 100%; transition: 0.6s; }
/* Rank display style */
#w-rank-display { font-family: 'Pirata One', cursive; font-size: 1.5rem; color: var(--accent1); margin-bottom: 10px; text-align: right; }
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="page-wrap">
  <header>
    <h1 class="logo">The Jolly Roger</h1>
    <div class="header-sub">Neverland Protocol Analytics</div>
  </header>

  <div class="stats-grid" id="protocol-stats">
    </div>

  <div class="card-box">
    <div class="tools-tabs">
        <button class="tab-btn active" data-tab="leverage">⚔️ Leverage Calc</button>
        <button class="tab-btn" data-tab="liquidation">💀 Liquidation Risk</button>
        <button class="tab-btn" data-tab="wallet">🔭 Wallet Sim</button>
    </div>

    <div class="tool-panel active" id="tab-leverage">
      <div class="form-grid">
        <div class="form-group"><label>Deposit</label><input type="number" id="lev-deposit" value="1000"></div>
        <div class="form-group">
            <label>Leverage</label>
            <input type="range" id="lev-leverage" min="1" max="5" step="0.1" value="2">
            <span id="lev-leverage-val">2.0x</span>
        </div>
        <button class="calc-btn" onclick="calcLeverage()">Calculate</button>
      </div>
      <div class="result-grid">
        <div class="result-box"><div class="r-label">Total Position</div><div class="r-val" id="lev-r-pos">—</div></div>
        <div class="result-box"><div class="r-label">DUST Velocity</div><div class="r-val" id="lev-r-velocity" style="color:var(--accent1)">—</div></div>
        <div class="result-box"><div class="r-label">Net APY</div><div class="r-val" id="lev-r-apy">—</div></div>
        <div class="result-box"><div class="r-label">Health Factor</div><div class="r-val" id="lev-r-hf">—</div></div>
      </div>
    </div>

    <div class="tool-panel" id="tab-liquidation">
        <div class="form-grid">
          <input type="number" id="liq-collateral" value="10000">
          <input type="number" id="liq-debt" value="5000">
          <select id="liq-asset-type">
            <option value="stablecoin">Stablecoin</option>
            <option value="volatile">Volatile (ETH)</option>
            <option value="high-vol">High Vol (MON)</option>
          </select>
          <button class="calc-btn" onclick="calcLiquidation()">Assess</button>
        </div>
        <div class="result-grid">
          <div class="result-box"><div class="r-label">Health Factor</div><div class="r-val" id="liq-r-hf">—</div></div>
          <div class="result-box"><div class="r-label">Storm Warning (Exit)</div><div class="r-val" id="liq-r-storm" style="color:var(--warning)">—</div></div>
          <div class="result-box"><div class="r-label">Risk Level</div><div class="r-val" id="liq-r-risk">—</div></div>
        </div>
    </div>

    <div class="tool-panel" id="tab-wallet">
        <div id="w-rank-display"></div>
        <input type="text" id="wallet-addr" placeholder="0x...">
        <button class="calc-btn" onclick="loadWallet()">Analyze</button>
        <div id="wallet-result" style="display:none;">
            <div class="r-val" id="w-collateral"></div>
            <div class="hf-bar-wrap"><div class="hf-bar" id="w-hf-bar"></div></div>
        </div>
    </div>
  </div>
  <script>
    // --- STARFIELD ENGINE ---
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<250; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5,
                vel: Math.random() * 0.05 + 0.02
            });
        }
    }

    function animateStars() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        stars.forEach(s => {
            ctx.globalAlpha = Math.random() * 0.5 + 0.5;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
            ctx.fill();
            s.y -= s.vel;
            if(s.y < 0) s.y = canvas.height;
        });
        requestAnimationFrame(animateStars);
    }
    initStars();
    animateStars();

    // --- NAUTICAL RANKINGS ---
    const RANKS = [
        { min: 1000000, name: "Fleet Admiral of Neverland" },
        { min: 500000,  name: "Dread Pirate Lord" },
        { min: 100000,  name: "Galleon Commander" },
        { min: 25000,   name: "First Mate" },
        { min: 5000,    name: "Swashbuckler" },
        { min: 0,       name: "Stowaway" }
    ];

    // --- TAB LOGIC ---
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn, .tool-panel').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
    });

    // --- CALCULATORS ---

    function calcLeverage() {
        const deposit = parseFloat(document.getElementById('lev-deposit').value);
        const lev = parseFloat(document.getElementById('lev-leverage').value);
        
        const totalPos = deposit * lev;
        const borrow = totalPos - deposit;
        
        // Velocity: $V = \frac{Borrow \times Rate}{TimeFactor}$
        // Simulated: 12.5% annualized DUST accumulation
        const dustVelocity = (borrow * 0.125) / 365; 
        
        const hf = (totalPos * 0.8) / borrow; // Simple 80% LTV logic

        document.getElementById('lev-r-pos').innerText = `$${totalPos.toLocaleString()}`;
        document.getElementById('lev-r-velocity').innerText = `${dustVelocity.toFixed(4)} DUST/Day`;
        document.getElementById('lev-r-hf').innerText = hf.toFixed(2);
        document.getElementById('lev-r-apy').innerText = `${(15.4 * lev).toFixed(2)}%`;
    }

    function calcLiquidation() {
        const col = parseFloat(document.getElementById('liq-collateral').value);
        const debt = parseFloat(document.getElementById('liq-debt').value);
        const asset = document.getElementById('liq-asset-type').value;

        let ltv = 0.8;
        if(asset === 'volatile') ltv = 0.7;
        if(asset === 'high-vol') ltv = 0.6;

        const hf = (col * ltv) / debt;
        const liqPrice = debt / (col * ltv);
        
        // Storm Warning: Exit price is 10% above liquidation point
        const stormExit = liqPrice * 1.1;

        document.getElementById('liq-r-hf').innerText = hf.toFixed(2);
        document.getElementById('liq-r-storm').innerText = `$${stormExit.toFixed(2)}`;
        
        const riskBox = document.getElementById('liq-r-risk');
        if(hf < 1.1) { riskBox.innerText = "CRITICAL"; riskBox.style.color = "var(--negative)"; }
        else if(hf < 1.5) { riskBox.innerText = "CHOPPY SEAS"; riskBox.style.color = "var(--warning)"; }
        else { riskBox.innerText = "CLEAR SKIES"; riskBox.style.color = "var(--positive)"; }
    }

    async function loadWallet() {
        const addr = document.getElementById('wallet-addr').value;
        const display = document.getElementById('w-rank-display');
        const resDiv = document.getElementById('wallet-result');
        
        if(!ethers.isAddress(addr)) {
            alert("Invalid Pirate Address");
            return;
        }

        // Simulated Blockchain Fetch
        const mockBalance = Math.random() * 200000;
        const rank = RANKS.find(r => mockBalance >= r.min).name;

        display.innerText = rank;
        resDiv.style.display = "block";
        document.getElementById('w-collateral').innerText = `Total Loot: $${mockBalance.toLocaleString()}`;
        
        const bar = document.getElementById('w-hf-bar');
        bar.style.width = "85%";
        bar.style.background = "var(--positive)";
    }

    // UI Updates
    document.getElementById('lev-leverage').oninput = function() {
        document.getElementById('lev-leverage-val').innerText = this.value + 'x';
    };

    window.onresize = initStars;
  </script>
</body>
</html>
